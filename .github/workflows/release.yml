name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        id: build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_num=${VERSION_NUM}" >> "$GITHUB_OUTPUT"

          platforms=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/ghx-${GOOS}-${GOARCH}"
            mkdir -p "${output}"

            EXE_SUFFIX=""
            if [ "${GOOS}" = "windows" ]; then
              EXE_SUFFIX=".exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=${GOOS} GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${output}/ghx${EXE_SUFFIX}" ./src/cmd/ghx
            GOOS=${GOOS} GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${output}/ghxd${EXE_SUFFIX}" ./src/cmd/ghxd

            if [ "${GOOS}" = "windows" ]; then
              # Include gh.cmd shim for Windows
              printf '@echo off\r\nrem ghx-shim: this script redirects gh commands through ghx for caching\r\nghx %%*\r\n' > "${output}/gh.cmd"
              (cd "${output}" && zip "../../dist/ghx-${GOOS}-${GOARCH}.zip" "ghx${EXE_SUFFIX}" "ghxd${EXE_SUFFIX}" "gh.cmd")
            else
              # Include gh shim script in tarball
              printf '#!/bin/sh\n# ghx-shim: this script redirects gh commands through ghx for caching\nexec ghx "$@"\n' > "${output}/gh"
              chmod +x "${output}/gh"
              tar -czf "dist/ghx-${GOOS}-${GOARCH}.tar.gz" -C "${output}" ghx ghxd gh
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

      - name: Compute checksums
        id: checksums
        run: |
          cd dist
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] && sha256sum "$f"
          done | tee checksums.txt

          echo "SHA_DARWIN_ARM64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "SHA_DARWIN_AMD64=$(grep darwin-amd64 checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "SHA_LINUX_AMD64=$(grep linux-amd64 checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "SHA_LINUX_ARM64=$(grep linux-arm64 checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.build.outputs.version }}
          VERSION_NUM=${{ steps.build.outputs.version_num }}
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          SHA_DARWIN_ARM64=${{ steps.checksums.outputs.SHA_DARWIN_ARM64 }}
          SHA_DARWIN_AMD64=${{ steps.checksums.outputs.SHA_DARWIN_AMD64 }}
          SHA_LINUX_AMD64=${{ steps.checksums.outputs.SHA_LINUX_AMD64 }}
          SHA_LINUX_ARM64=${{ steps.checksums.outputs.SHA_LINUX_ARM64 }}

          cat > ghx.rb << FORMULA
          class Ghx < Formula
            desc "Caching proxy daemon for the GitHub CLI (valkyriweb fork)"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/ghx-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/ghx-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/ghx-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/ghx-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "ghx"
              bin.install "ghxd"
              bin.install "gh" unless real_gh_on_path?
            end

            # True when a real gh (not our shim) is already on PATH, so we skip the shim.
            def real_gh_on_path?
              ENV.fetch("PATH", "").split(File::PATH_SEPARATOR).any? do |dir|
                p = File.join(dir, "gh")
                next false unless File.executable?(p)

                begin
                  File.binread(p, 512).exclude?("ghx-shim")
                rescue
                  false
                end
              end
            end

            def caveats
              <<~EOS
                ghx caches GitHub CLI calls to prevent API rate limiting.
                Use 'ghx' instead of 'gh' to benefit from caching.

                If no 'gh' binary was found during installation, a lightweight
                shim was installed that routes 'gh' calls through ghx.
              EOS
            end

            test do
              assert_match "ghxd", shell_output("#{bin}/ghxd --help")
            end
          end
          FORMULA

          sed -i 's/^          //' ghx.rb

          echo "Generated formula:"
          cat ghx.rb

          # Clone the tap, update formula, push
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/valkyriweb/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp ghx.rb tap/Formula/ghx.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ghx.rb
          git commit -m "Update ghx to ${VERSION}"
          git push
